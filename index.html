<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle — TypeScript Clone</title>
  <style>
    body {
      margin: 0;
      background: #09090b;
      color: #e4e4e7;
      font-family: monospace;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="wordle-container">
    <div id="wordle-message" class="wordle-message"></div>
    <div id="wordle-board" class="wordle-board"></div>
    <div id="wordle-keyboard" class="wordle-kb"></div>
    <button id="wordle-new-game" class="wordle-new-game">[ new game ]</button>
  </div>
  <script src="dist/wordle.js"></script>
</body>
</html>
